<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#2563eb" />
    <title>诉讼保 · 机构端预审</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <div id="static-fallback" style="display:none;max-width:28rem;margin:2rem auto;padding:1.5rem;font-family:system-ui,sans-serif;line-height:1.6;color:#e2e8f0;background:#0f172a;min-height:100dvh">
        <h1 style="font-size:1.125rem;font-weight:700;color:#f8fafc">无法直接打开 index.html</h1>
        <p>机构端是 Vite 应用，需要通过开发服务器访问，不能直接双击 HTML 文件。</p>
        <p style="margin-top:1rem;font-weight:600">请在项目根目录执行：</p>
        <pre style="margin-top:0.5rem;padding:0.75rem;background:#1e293b;border-radius:0.5rem;font-size:0.875rem;overflow:auto;color:#cbd5e1">npm install
npm run dev</pre>
        <p style="margin-top:1rem">然后在浏览器打开：<strong>http://localhost:5174</strong></p>
        <p style="margin-top:0.75rem;font-size:0.875rem;color:#94a3b8">需与 Mock API（3001）同时运行，建议始终使用 <code>npm run dev</code> 一键启动三端。</p>
      </div>
    </div>
    <script>
      if (location.protocol === 'file:') {
        document.getElementById('static-fallback').style.display = 'block';
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
